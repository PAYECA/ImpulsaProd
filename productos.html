<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImpulsaProd — Productos</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="logo">
            <div class="logo-icon">IP</div>
            <div>
                <div class="logo-title">ImpulsaProd</div>
                <div class="logo-sub">Panel de gestión</div>
            </div>
        </div>
        <nav class="nav">
            <a href="index.html" class="nav-item">
                <span class="nav-icon">📊</span> Dashboard
            </a>
            <a href="productos.html" class="nav-item active">
                <span class="nav-icon">📦</span> Productos
            </a>
            <a href="ventas.html" class="nav-item">
                <span class="nav-icon">💰</span> Ventas
            </a>
            <a href="creditos.html" class="nav-item">
                <span class="nav-icon">📋</span> Créditos
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="avatar">PC</div>
            <div>
                <div class="user-name">Paula Cañon</div>
                <div class="user-role">Administrador</div>
            </div>
        </div>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="main">

        <!-- TOPBAR -->
        <div class="topbar">
            <div>
                <h1 class="page-title">Productos</h1>
                <p class="page-sub">Gestiona tu inventario de productos</p>
            </div>
        </div>

        <!-- FORMULARIO AGREGAR PRODUCTO -->
        <div class="form-wrap">
            <h2 class="form-title">➕ Agregar nuevo producto</h2>
            <div id="alerta-producto" class="alert" style="display:none;"></div>
            <div class="form-grid">
                <div class="form-group">
                    <label>Nombre del producto</label>
                    <input type="text" id="inp-nombre" placeholder="Ej: Cuaderno universitario">
                </div>
                <div class="form-group">
                    <label>Categoría</label>
                    <select id="inp-categoria">
                        <option value="">-- Seleccionar --</option>
                        <option>Papelería</option>
                        <option>Electrónica</option>
                        <option>Accesorios</option>
                        <option>Alimentos</option>
                        <option>Digital</option>
                        <option>Ropa</option>
                        <option>Otro</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Tipo de producto</label>
                    <select id="inp-tipo" onchange="mostrarCamposExtra(this.value)">
                        <option value="normal">Normal</option>
                        <option value="perecedero">Perecedero (con vencimiento)</option>
                        <option value="digital">Digital (con URL)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Precio de compra ($)</label>
                    <input type="number" id="inp-compra" placeholder="0" min="0">
                </div>
                <div class="form-group">
                    <label>Precio de venta ($)</label>
                    <input type="number" id="inp-venta" placeholder="0" min="0">
                </div>
                <div class="form-group">
                    <label>Stock inicial</label>
                    <input type="number" id="inp-stock" placeholder="0" min="0">
                </div>

                <!-- Campos extra para perecederos -->
                <div class="form-group" id="campo-vencimiento" style="display:none;">
                    <label>Fecha de vencimiento</label>
                    <input type="date" id="inp-vencimiento">
                </div>

                <!-- Campos extra para digitales -->
                <div class="form-group" id="campo-url" style="display:none;">
                    <label>URL de descarga</label>
                    <input type="text" id="inp-url" placeholder="https://...">
                </div>
                <div class="form-group" id="campo-formato" style="display:none;">
                    <label>Formato del archivo</label>
                    <input type="text" id="inp-formato" placeholder="PDF, ZIP, MP3...">
                </div>
            </div>

            <!-- GANANCIA EN TIEMPO REAL -->
            <div id="preview-ganancia" style="display:none; margin-bottom:16px;">
                <div class="alert alert-success">
                    💵 Ganancia por unidad: <strong id="valor-ganancia">$0</strong>
                </div>
            </div>

            <div style="display:flex; gap:12px;">
                <button class="btn-primary" onclick="agregarProducto()">
                    ✅ Guardar producto
                </button>
                <button class="btn-secondary" onclick="limpiarTodo()">
                    🗑️ Limpiar formulario
                </button>
            </div>
        </div>

        <!-- TABLA DE PRODUCTOS -->
        <div class="table-wrap">
            <div class="table-header">
                <h2 class="table-title">📦 Inventario completo</h2>
                <input class="search" type="text" placeholder="🔍 Buscar producto..."
                    onkeyup="filtrarTabla(this.value)">
            </div>
            <table id="tablaProductos">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Producto</th>
                        <th>Tipo</th>
                        <th>Categoría</th>
                        <th>Stock</th>
                        <th>P. Compra</th>
                        <th>P. Venta</th>
                        <th>Ganancia</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla"></tbody>
            </table>
        </div>

    </div>

    <script src="js/app.js"></script>
    <script>
        // Mostrar ganancia en tiempo real
        ["inp-compra","inp-venta"].forEach(id => {
            document.getElementById(id).addEventListener("input", () => {
                const compra = parseFloat(document.getElementById("inp-compra").value) || 0;
                const venta  = parseFloat(document.getElementById("inp-venta").value) || 0;
                const ganancia = venta - compra;
                const preview = document.getElementById("preview-ganancia");
                const valor   = document.getElementById("valor-ganancia");
                if (compra > 0 && venta > 0) {
                    preview.style.display = "block";
                    valor.textContent = "$" + ganancia.toLocaleString("es-CO");
                    valor.style.color = ganancia >= 0 ? "#3b6d11" : "#a32d2d";
                } else {
                    preview.style.display = "none";
                }
            });
        });

        function mostrarCamposExtra(tipo) {
            document.getElementById("campo-vencimiento").style.display =
                tipo === "perecedero" ? "flex" : "none";
            document.getElementById("campo-url").style.display =
                tipo === "digital" ? "flex" : "none";
            document.getElementById("campo-formato").style.display =
                tipo === "digital" ? "flex" : "none";
        }

        function limpiarTodo() {
            ["inp-nombre","inp-compra","inp-venta","inp-stock",
             "inp-vencimiento","inp-url","inp-formato"].forEach(id => {
                document.getElementById(id).value = "";
            });
            document.getElementById("inp-categoria").selectedIndex = 0;
            document.getElementById("inp-tipo").selectedIndex = 0;
            document.getElementById("preview-ganancia").style.display = "none";
            mostrarCamposExtra("normal");
        }
    </script>
</body>
</html>
